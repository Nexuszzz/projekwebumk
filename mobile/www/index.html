<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>UMKMan</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #0b141a;
        color: #e9edef;
      }
      main {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(145deg, #25d366, #128c7e);
        display: grid;
        place-items: center;
        margin: 0 auto 1rem;
        font-weight: 800;
        font-size: 1.35rem;
        color: #053b1f;
        box-shadow: 0 12px 40px -8px rgba(37, 211, 102, 0.45);
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        max-width: 22rem;
        color: rgba(233, 237, 239, 0.72);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .spin {
        width: 28px;
        height: 28px;
        margin: 1.25rem auto 0;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #25d366;
        border-radius: 50%;
        animation: rot 0.8s linear infinite;
      }
      @keyframes rot {
        to {
          transform: rotate(360deg);
        }
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: rgba(233, 237, 239, 0.45);
      }
      a {
        color: #25d366;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <div class="logo" aria-hidden="true">U</div>
        <h1>UMKMan</h1>
        <p>
          Membuka aplikasi… Pastikan HP terhubung internet. Backend jalan di
          Vercel (aman meski Docker laptop mati).
        </p>
        <div class="spin" aria-hidden="true"></div>
        <p class="hint">
          Fallback offline. Buka di browser:
          <a href="https://umkman.vercel.app">umkman.vercel.app</a>
        </p>
      </div>
    </main>
    <script>
      // Jika server.url Capacitor gagal, coba redirect manual
      setTimeout(function () {
        try {
          if (location.protocol === 'https:' || location.protocol === 'http:') {
            return
          }
          location.replace('https://umkman.vercel.app')
        } catch (e) {}
      }, 2500)
    </script>
  </body>
</html>
