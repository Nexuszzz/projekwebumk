# Postgres lokal untuk UMKMan
# Jalankan: docker compose up -d
# Lalu: npx prisma migrate dev
#       npm run db:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: umkman
      POSTGRES_PASSWORD: umkman
      POSTGRES_DB: umkman
    volumes:
      - umkman_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U umkman -d umkman']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  umkman_pg:
